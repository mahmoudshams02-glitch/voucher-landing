<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voucher Life</title>

<style>
body {
margin:0;
font-family:Arial;
background:#f5f7f6;
}

/* HEADER */
.hero {
background:#18a999;
color:white;
padding:40px 20px;
border-radius:0 0 30px 30px;
text-align:center;
}

.hero h1 {
margin-bottom:10px;
}

.btn {
padding:12px 25px;
border-radius:25px;
border:none;
margin:5px;
cursor:pointer;
font-size:14px;
}

.primary {
background:white;
color:#18a999;
}

.outline {
border:1px solid white;
color:white;
background:none;
}

/* SECTIONS */
.section {
padding:20px;
}

.title {
font-size:20px;
margin-bottom:15px;
font-weight:bold;
}

/* CARDS */
.cards {
display:flex;
gap:10px;
overflow-x:auto;
}

.card {
background:white;
padding:15px;
border-radius:15px;
min-width:120px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* PARTNERS */
.partner {
background:white;
padding:15px;
border-radius:15px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.discount {
color:#18a999;
font-weight:bold;
}

/* CTA */
.cta {
background:#18a999;
color:white;
padding:30px;
margin:20px;
border-radius:20px;
text-align:center;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>وفر حتى 50% على خدماتك الطبية</h1>
<p>مستشفيات - معامل - صيدليات - عيادات</p>

<button class="btn primary" onclick="window.location.href='https://wa.me/201007190880'">
اشترك الآن
</button>

<button class="btn outline" onclick="window.location.href='https://play.google.com/store/apps/details?id=com.voucher_life.app'">
تحميل التطبيق
</button>
</div>

<!-- CATEGORIES -->
<div class="section">
<div class="title">الفئات الرئيسية</div>

<div class="cards">
<div class="card">🏥 مستشفيات</div>
<div class="card">🧪 معامل</div>
<div class="card">💊 صيدليات</div>
<div class="card">🩺 عيادات</div>
</div>
</div>

<!-- PARTNERS -->
<div class="section">
<div class="title">أهم الشركاء</div>
<div id="partners">جاري التحميل...</div>
</div>

<!-- CTA -->
<div class="cta">
<h2>ابدأ التوفير الآن</h2>
<p>اشترك واحصل على خصومات فورية</p>

<button class="btn primary" onclick="window.location.href='https://wa.me/201007190880'">
تواصل واتساب
</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvZ4BjZm02FJDGqBgIrbFrG9Jn4dGDQE4",
  authDomain: "voucher-life-4702f.firebaseapp.com",
  projectId: "voucher-life-4702f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadPartners() {
  const querySnapshot = await getDocs(collection(db, "partners"));
  let html = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    html += `
      <div class="partner">
        <span>${data.name}</span>
        <span class="discount">${data.discount}%</span>
      </div>
    `;
  });

  document.getElementById("partners").innerHTML = html || "لا يوجد بيانات";
}

loadPartners();
</script>

</body>
</html>
